<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Lantern #1 - WebAR Experience</title>

  <!-- SEO Meta Tags -->
  <meta name="description"
    content="Step into a magical WebAR experience and summon Magic Lantern #1 right in your space using Google Model Viewer.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
    rel="stylesheet">

  <!-- Model Viewer CDN -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <style>
    :root {
      --primary-glow: rgba(255, 170, 50, 0.15);
      --accent-gold: #ffd700;
      --accent-orange: #ff6600;
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.7);
      --glass-bg: rgba(18, 12, 30, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 50% 50%, #1a102f 0%, #080512 100%);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.5s ease;
    }

    /* Ambient Background Glow */
    .background-glow {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, var(--primary-glow) 0%, rgba(255, 170, 50, 0) 70%);
      filter: blur(40px);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating particles in background */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: rise infinite linear;
    }

    @keyframes rise {
      0% {
        transform: translateY(105vh) translateX(0) scale(0);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-10vh) translateX(100px) scale(1.5);
        opacity: 0;
      }
    }

    /* Viewer Container & Float Animation */
    .viewer-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .float-animation {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(10px);
      }

      50% {
        transform: translateY(-25px);
      }

      100% {
        transform: translateY(10px);
      }
    }

    #lantern-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
      outline: none;
    }

    /* Glassmorphism UI Overlay */
    .ui-overlay {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 420px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 28px;
      z-index: 10;
      text-align: center;
      box-shadow: var(--glass-shadow), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 40%, var(--accent-gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }

    .instructions {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    /* Modern AR Trigger Button */
    .ar-btn {
      width: 100%;
      padding: 16px 28px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(135deg, #ffa600 0%, var(--accent-orange) 100%);
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(255, 102, 0, 0.3);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .ar-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 30px rgba(255, 102, 0, 0.5);
    }

    .ar-btn:active {
      transform: translateY(1px) scale(0.98);
    }

    .btn-icon {
      font-size: 18px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }

      100% {
        transform: scale(1);
      }
    }

    /* AR Presentation Modes - Hide standard UI */
    body.ar-active {
      background: transparent !important;
    }

    body.ar-active .ui-overlay,
    body.ar-active .background-glow,
    body.ar-active .particle {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 20px);
    }

    body.ar-active .model-switcher {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -20px);
    }

    /* Model Switcher UI */
    .model-switcher {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(18, 12, 30, 0.5);
      backdrop-filter: blur(15px) saturate(140%);
      -webkit-backdrop-filter: blur(15px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 6px;
      display: flex;
      gap: 4px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: opacity 0.4s ease, transform 0.4s ease;

      /* Mobile Scrollability support */
      max-width: 90vw;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      /* Hide scrollbar for Firefox */
    }

    /* Hide scrollbar for Chrome, Safari, and Opera */
    .model-switcher::-webkit-scrollbar {
      display: none;
    }

    .switcher-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 14px;
      transition: all 0.3s ease;
      flex-shrink: 0;
      /* Prevent shrinking in scroll container */
    }

    .switcher-btn:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    .switcher-btn.active {
      color: #ffffff;
      background: linear-gradient(135deg, #ffa600 0%, var(--accent-orange) 100%);
      box-shadow: 0 4px 12px rgba(255, 102, 0, 0.2);
    }

    /* Custom model-viewer AR Button (Required but hidden because we trigger it programmatically) */
    #hidden-ar-button {
      display: none;
    }
  </style>
</head>

<body>

  <!-- Floating Model Switcher -->
  <div class="model-switcher">
    <a href="index.html" class="switcher-btn active" id="btn-lantern1">Lantern 1</a>
    <a href="lantern2.html" class="switcher-btn" id="btn-lantern2">Lantern 2</a>
    <a href="lantern3.html" class="switcher-btn" id="btn-lantern3">Lantern 3</a>
    <a href="lantern4.html" class="switcher-btn" id="btn-lantern4">Lantern 4</a>
    <a href="lantern5.html" class="switcher-btn" id="btn-lantern5">Lantern 5</a>
    <a href="lantern6.html" class="switcher-btn" id="btn-lantern6">Lantern 6</a>
    <a href="lantern7.html" class="switcher-btn" id="btn-lantern7">Lantern 7</a>
  </div>

  <!-- Background Glow & Particle Effects -->
  <div class="background-glow"></div>

  <!-- Floating Container for Model-Viewer -->
  <div class="viewer-container float-animation">
    <model-viewer id="lantern-viewer" src="models/lantern1.glb" ios-src="models/lantern1.usdz" ar
      ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate auto-rotate-delay="0"
      interaction-prompt="none" shadow-intensity="1.5" shadow-softness="1" disable-pan disable-zoom
      alt="Magic Lantern #1 Floating in 3D Space">

      <!-- Required slot element for <model-viewer> to link to its internal trigger -->
      <button slot="ar-button" id="hidden-ar-button"></button>
    </model-viewer>
  </div>

  <!-- Glassmorphism Card Overlay -->
  <div class="ui-overlay">
    <div>
      <h1 class="title">Magic Lantern #1</h1>
      <p class="instructions">Point your camera at the ground and press the button below to bring the magic lantern to
        life in your space.</p>
    </div>
    <button id="custom-ar-trigger" class="ar-btn">
      <span class="btn-icon">✨</span> Enter WebAR
    </button>
  </div>

  <script>
    // Particle Generator for Magical Ambience
    function initParticles() {
      const container = document.body;
      const particleCount = 20;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';

        const size = Math.random() * 4 + 2; // Size between 2px and 6px
        const leftPosition = Math.random() * 100; // Position across screen width
        const duration = Math.random() * 8 + 7; // Float duration 7s to 15s
        const delay = Math.random() * -15; // Negative delay to prevent spawning lag

        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${leftPosition}%`;
        particle.style.animationDuration = `${duration}s`;
        particle.style.animationDelay = `${delay}s`;

        // Randomized magical glowing gold/orange colors
        const opacity = Math.random() * 0.4 + 0.3; // Opacity 0.3 to 0.7
        const goldHue = 200 + Math.random() * 55; // Keep it golden/warm yellow
        particle.style.backgroundColor = `rgba(255, ${goldHue}, 80, ${opacity})`;
        particle.style.boxShadow = `0 0 ${size * 2}px ${size / 2}px rgba(255, ${goldHue}, 50, 0.4)`;

        container.appendChild(particle);
      }
    }

    // Initialize particles on window load
    window.addEventListener('DOMContentLoaded', () => {
      initParticles();

      const viewer = document.getElementById('lantern-viewer');
      const triggerBtn = document.getElementById('custom-ar-trigger');
      const hiddenArBtn = document.getElementById('hidden-ar-button');

      // Click event for the custom AR Button
      triggerBtn.addEventListener('click', () => {
        // Trigger model-viewer's internal AR launcher
        if (viewer.activateAR) {
          viewer.activateAR();
        } else {
          hiddenArBtn.click();
        }
      });

      // Helper to resume auto-rotation
      const resumeAutoRotate = () => {
        setTimeout(() => {
          viewer.autoRotate = true;
        }, 300);
      };

      // Listen to AR Status change to hide/show UI and toggle transparency
      viewer.addEventListener('ar-status', (event) => {
        if (event.detail.status === 'session-started') {
          document.body.classList.add('ar-active');
        } else if (event.detail.status === 'not-presenting') {
          document.body.classList.remove('ar-active');
          resumeAutoRotate();
        }
      });

      // Listen for page visibility and window focus changes to resume auto-rotation on iOS return
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          resumeAutoRotate();
        }
      });

      window.addEventListener('focus', () => {
        resumeAutoRotate();
      });
    });
  </script>
</body>

</html>
